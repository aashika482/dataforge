##############################################################################
# email-alerts.cfg — Nagios Contact and Alert Configuration for DataForge
#
# WHAT IS NAGIOS ALERTING?
#   When a service check fails (e.g. /api/health returns 500), Nagios waits
#   for max_check_attempts failures, then notifies the contacts defined here.
#   Notifications can be sent via email, SMS, Slack webhook, PagerDuty, etc.
#   The built-in method is email via the notify-by-email commands below.
#
# HOW ALERTS FLOW:
#   1. Service check fails
#   2. Nagios retries up to max_check_attempts times
#   3. State changes to CRITICAL
#   4. Nagios calls notify-service-by-email for every contact in the group
#   5. The contact receives an email with the host, service, and output details
#   6. When the service recovers, a RECOVERY email is sent automatically
#
# CONTACT vs CONTACT GROUP:
#   contact       — an individual person with an email and notification schedule
#   contactgroup  — a named group of contacts (services reference groups, not
#                   individual contacts, for flexibility)
##############################################################################

# ─────────────────────────────────────────────────────────────────────────────
# Contact Definition
# ─────────────────────────────────────────────────────────────────────────────
define contact {
    # Unique name referenced by contactgroup below
    contact_name                    dataforge-admin

    # Human-readable name shown in the Nagios UI
    alias                           DataForge Administrator

    # Email address where alerts are sent
    email                           aashika482@example.com

    # Use the generic-contact template for sensible defaults
    use                             generic-contact

    # When to send notifications (24x7 = any time, day or night)
    host_notification_period        24x7
    service_notification_period     24x7

    # Which host states trigger a notification:
    # d=Down, u=Unreachable, r=Recovery, f=Flapping, s=Scheduled downtime
    host_notification_options       d,u,r,f,s

    # Which service states trigger a notification:
    # w=Warning, u=Unknown, c=Critical, r=Recovery, f=Flapping
    service_notification_options    w,u,c,r,f

    # Commands used to send the actual notifications
    # These built-in commands email the contact using the system mail utility
    host_notification_commands      notify-host-by-email
    service_notification_commands   notify-service-by-email
}

# ─────────────────────────────────────────────────────────────────────────────
# Contact Group
# Groups contacts so that service checks can reference the group name.
# Add more contacts to the "members" list to notify additional people.
# ─────────────────────────────────────────────────────────────────────────────
define contactgroup {
    # Name referenced in host and service definitions (contact_groups: admins)
    contactgroup_name   admins

    alias               DataForge Administrators

    # Comma-separated list of contact names in this group
    members             dataforge-admin
}
