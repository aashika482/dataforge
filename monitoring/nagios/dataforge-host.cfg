##############################################################################
# dataforge-host.cfg — Nagios Host Definition for DataForge
#
# WHAT IS A NAGIOS HOST DEFINITION?
#   In Nagios, a "host" represents a machine or application server being
#   monitored. You define it once here and then attach any number of "service"
#   checks to it (HTTP checks, port checks, CPU checks, etc.).
#
# HOW NAGIOS USES THIS FILE:
#   Nagios reads all .cfg files in its config directory on startup.
#   It uses the host definition to know *what* to monitor and *how often*
#   to check it. When a check fails, Nagios can send alerts (email/SMS)
#   based on the notification settings below.
#
# FIELD REFERENCE:
#   host_name            — unique identifier used to link service checks
#   alias                — human-readable name shown in the dashboard
#   address              — IP or hostname Nagios will connect to
#   max_check_attempts   — how many consecutive failures before alerting
#   check_interval       — minutes between active checks (when host is UP)
#   notification_interval — minutes between repeat alert notifications
##############################################################################

define host {
    # Unique name — referenced by service checks in dataforge-services.cfg
    host_name               dataforge-app

    # Human-readable label shown in the Nagios web dashboard
    alias                   DataForge Application Server

    # Address Nagios connects to when running checks
    # In Docker, this could be the container name or IP
    address                 localhost

    # Use the generic host template which provides sensible defaults
    # (check_command, notification_period, contact_groups, etc.)
    use                     generic-host

    # Check the host is up with a ping before running service checks
    check_command           check-host-alive

    # Number of consecutive failed checks before changing state to DOWN
    # and sending an alert. Set to 3 to avoid alerts for transient blips.
    max_check_attempts      3

    # How often (in minutes) to actively check if the host is UP
    check_interval          5

    # How often (in minutes) to re-send an alert if the problem persists
    notification_interval   30

    # Notify on these host state changes: Down (d), Unreachable (u), Recovery (r)
    notification_options    d,u,r

    # Use the built-in contact group — ties to alert contacts defined separately
    contact_groups          admins
}
