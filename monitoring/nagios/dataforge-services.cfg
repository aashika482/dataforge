##############################################################################
# dataforge-services.cfg — Nagios Service Check Definitions for DataForge
#
# WHAT ARE SERVICE CHECKS?
#   A Nagios "service" is an individual thing being monitored on a host —
#   for example: "is the HTTP endpoint returning 200?", "is port 7070 open?".
#   Each service check runs on a schedule and reports one of:
#     OK       — everything is fine
#     WARNING  — something looks unusual
#     CRITICAL — the check failed, alert the team
#     UNKNOWN  — the check itself couldn't run
#
# HOW CHECK COMMANDS WORK:
#   check_http  — Nagios plugin that makes an HTTP request and checks the response
#   check_tcp   — Nagios plugin that opens a TCP connection to verify a port is open
#   The "!" separates the command name from its arguments.
#
# TEMPLATES:
#   "use generic-service" inherits sensible defaults (notification_period,
#   contact_groups, etc.) from Nagios's built-in generic-service template.
##############################################################################

# ─────────────────────────────────────────────────────────────────────────────
# Service 1: API Health Check
# Calls the /api/health endpoint every 5 minutes.
# A non-200 response or connection failure triggers a CRITICAL alert.
# ─────────────────────────────────────────────────────────────────────────────
define service {
    use                     generic-service
    host_name               dataforge-app
    service_description     DataForge API Health

    # check_http arguments:
    #   -p 7070      — connect on port 7070 (not the default 80)
    #   -u /api/health — request this URL path
    check_command           check_http!-p 7070 -u /api/health

    # Check every 5 minutes when the service is in an OK state
    normal_check_interval   5

    # Check every 1 minute when the service is in a problem state (faster recovery detection)
    retry_check_interval    1

    # Send alert after 3 consecutive failures (avoids false alarms)
    max_check_attempts      3

    # Notify on Warning (w), Unknown (u), Critical (c), and Recovery (r)
    notification_options    w,u,c,r
}

# ─────────────────────────────────────────────────────────────────────────────
# Service 2: API Schema Templates Response
# Checks that the /api/schema/templates endpoint responds successfully.
# Useful for verifying the generator engine is initialised correctly.
# ─────────────────────────────────────────────────────────────────────────────
define service {
    use                     generic-service
    host_name               dataforge-app
    service_description     DataForge API Response

    check_command           check_http!-p 7070 -u /api/schema/templates

    normal_check_interval   5
    retry_check_interval    1
    max_check_attempts      3
    notification_options    w,u,c,r
}

# ─────────────────────────────────────────────────────────────────────────────
# Service 3: Port Availability Check
# Verifies that TCP port 7070 is open and accepting connections.
# This is a lower-level check than HTTP — it passes even if the app returns
# an error code, as long as the port is listening. Useful to distinguish
# "port down" from "app running but returning errors".
# ─────────────────────────────────────────────────────────────────────────────
define service {
    use                     generic-service
    host_name               dataforge-app
    service_description     DataForge Port 7070

    # check_tcp!7070 — open a TCP connection to port 7070
    check_command           check_tcp!7070

    normal_check_interval   5
    retry_check_interval    1
    max_check_attempts      3
    notification_options    w,u,c,r
}
