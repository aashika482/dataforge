# =============================================================================
# application.properties
# Central configuration file for the DataForge Spring Boot application.
# Spring Boot reads this file automatically on startup.
# =============================================================================

# --- Server ---
# Port the embedded Tomcat server listens on
server.port=7070

# --- Application ---
spring.application.name=dataforge

# --- Swagger / OpenAPI ---
# URL path where the raw OpenAPI JSON spec is served
springdoc.api-docs.path=/api-docs
# URL path where the interactive Swagger UI is served
springdoc.swagger-ui.path=/swagger-ui.html

# --- Actuator ---
# Expose health, info, and prometheus endpoints over HTTP
management.endpoints.web.exposure.include=health,info,prometheus
# Show full health details (disk space, DB connectivity, etc.)
management.endpoint.health.show-details=always

# --- Logging ---
# Set log level for our application code to INFO (DEBUG is too noisy for prod)
logging.level.com.dataforge=INFO
# Human-readable log pattern: timestamp, thread, level, logger, message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --- DataForge custom properties ---
# Hard cap on rows a single request can generate (prevents abuse / memory issues)
dataforge.max-rows=1000
# Default number of rows when the caller does not specify a count
dataforge.default-rows=10
